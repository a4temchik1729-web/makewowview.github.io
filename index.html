<!DOCTYPE html>
<html>
  <head>
    <title>Web AR: Характеристики объекта</title>
    <!-- Подключаем A-Frame (основа для 3D/VR) -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- Подключаем AR.js (дополнение для работы с камерой и маркерами) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <!-- Сцена AR.js: sourceType: webcam запрашивает доступ к камере через getUserMedia -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Определяем маркер. В данном примере используется стандартный маркер 'hiro' -->
      <!-- Вы можете заменить его на свой QR-код, предварительно обучив систему -->
      <a-marker preset="hiro">
        
        <!-- Контейнер для текста с характеристиками -->
        <a-entity 
          position="0 1 0" 
          geometry="primitive: plane; width: 2; height: 1" 
          material="color: #333; opacity: 0.8">
          
          <!-- Текст с физическими характеристиками -->
          <a-text 
            value="ОБЪЕКТ: СТАЛЬНОЙ КУБ\nВес: 15.5 кг\nПлотность: 7800 кг/м3\nТемпература: 22C" 
            color="#fff" 
            align="center" 
            width="3" 
            position="0 0 0.1">
          </a-text>
        </a-entity>

        <!-- 3D модель самого объекта (опционально) -->
        <a-box position="0 0.5 0" material="opacity: 0.5; color: #4CC3D9;"></a-box>

      </a-marker>

      <!-- Камера для AR -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
